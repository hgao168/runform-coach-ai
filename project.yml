name: RunFormCoachAI
options:
  bundleIdPrefix: com.runformcoach
  developmentLanguage: en
  deploymentTarget:
    iOS: "16.0"

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  RunFormCoachAI:
    type: application
    platform: iOS
    sources:
      - path: ios/RunFormCoachAI
        excludes:
          - "**/*Tests*"
          - "**/*UITests*"
    info:
      path: ios/RunFormCoachAI/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleIconName: AppIcon
        CFBundleDisplayName: RunForm
        CFBundleName: RunForm
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        BACKEND_BASE_URL: $(BACKEND_BASE_URL)
        GOOGLE_IOS_CLIENT_ID: $(GOOGLE_IOS_CLIENT_ID)
        GOOGLE_REVERSED_CLIENT_ID: $(GOOGLE_REVERSED_CLIENT_ID)
        NSCameraUsageDescription: Record your running form with live framing guidance for accurate analysis.
        NSPhotoLibraryUsageDescription: Select a short running video for form analysis.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.movex.runformcoachai
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        DEVELOPMENT_TEAM: "39CYNW3CYT"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: iPhone Distribution
        PROVISIONING_PROFILE_SPECIFIER: RunFormCoachAI-Prod
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        CURRENT_PROJECT_VERSION: "3"
        MARKETING_VERSION: "1.2"
      configs:
        Debug:
          BACKEND_BASE_URL: https://runform-coach-ai-staging.up.railway.app
          STRAVA_BACKEND_BASE_URL: https://runform-coach-ai-production.up.railway.app
          GOOGLE_IOS_CLIENT_ID: 800424302505-n39j4tt9fc72tutmecekqjvn2g2puhj5.apps.googleusercontent.com
          GOOGLE_REVERSED_CLIENT_ID: com.googleusercontent.apps.800424302505-n39j4tt9fc72tutmecekqjvn2g2puhj5
        Release:
          BACKEND_BASE_URL: https://runform-coach-ai-production.up.railway.app
          STRAVA_BACKEND_BASE_URL: https://runform-coach-ai-production.up.railway.app
          GOOGLE_IOS_CLIENT_ID: 800424302505-n39j4tt9fc72tutmecekqjvn2g2puhj5.apps.googleusercontent.com
          GOOGLE_REVERSED_CLIENT_ID: com.googleusercontent.apps.800424302505-n39j4tt9fc72tutmecekqjvn2g2puhj5
    dependencies:
      - package: GoogleSignIn

  RunFormCoachAITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ios/RunFormCoachAITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.movex.runformcoachai.tests
        INFOPLIST_FILE: ios/RunFormCoachAI/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/RunFormCoachAI.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/RunFormCoachAI"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: RunFormCoachAI
    scheme:
      testTargets:
        - RunFormCoachAITests
      gatherCoverageData: true

  RunFormCoachAIUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ios/RunFormCoachAI
        includes:
          - "**/*UITests*"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.movex.runformcoachai.uitests
        INFOPLIST_FILE: ios/RunFormCoachAI/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        TEST_TARGET_NAME: RunFormCoachAI
    dependencies:
      - target: RunFormCoachAI
    scheme:
      testTargets:
        - RunFormCoachAIUITests
      gatherCoverageData: true

schemes:
  RunFormCoachAI:
    build:
      targets:
        RunFormCoachAI: all
        RunFormCoachAITests: [test]
        RunFormCoachAIUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - RunFormCoachAITests
        - RunFormCoachAIUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
