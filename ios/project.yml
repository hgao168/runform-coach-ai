name: RunFormCoachAI
options:
  bundleIdPrefix: com.runformcoachai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    INFOPLIST_FILE: RunFormCoachAI/Info.plist
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

configs:
  Debug:
    type: debug
  Release:
    type: release

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  RunFormCoachAI:
    type: application
    platform: iOS
    sources:
      - path: RunFormCoachAI
        excludes:
          - "**/*Tests*"
          - "**/*UITests*"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.runformcoachai
        INFOPLIST_FILE: RunFormCoachAI/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        ENABLE_HARDENED_RUNTIME: "YES"
      configs:
        Debug:
          BACKEND_BASE_URL: "https://runform-coach-ai-staging.up.railway.app"
          GOOGLE_IOS_CLIENT_ID: "800424302505-n39j4tt9fc72tutmecekqjvn2g2puhj5.apps.googleusercontent.com"
          GOOGLE_REVERSED_CLIENT_ID: "com.googleusercontent.apps.800424302505-n39j4tt9fc72tutmecekqjvn2g2puhj5"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
          GCC_OPTIMIZATION_LEVEL: "0"
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          BACKEND_BASE_URL: "https://runform-coach-ai-production.up.railway.app"
          GOOGLE_IOS_CLIENT_ID: "800424302505-n39j4tt9fc72tutmecekqjvn2g2puhj5.apps.googleusercontent.com"
          GOOGLE_REVERSED_CLIENT_ID: "com.googleusercontent.apps.800424302505-n39j4tt9fc72tutmecekqjvn2g2puhj5"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
          GCC_OPTIMIZATION_LEVEL: "s"
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - package: GoogleMobileAds
      - package: GoogleSignIn
    preBuildScripts:
      - name: SwiftLint
        script: |
          if which swiftlint >/dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
          fi
        basedOnDependencyAnalysis: false

  RunFormCoachAITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RunFormCoachAITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.runformcoachai.tests
        INFOPLIST_FILE: RunFormCoachAI/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/RunFormCoachAI.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/RunFormCoachAI"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: RunFormCoachAI
    scheme:
      testTargets:
        - RunFormCoachAITests
      gatherCoverageData: true

  RunFormCoachAIUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RunFormCoachAI
        includes:
          - "**/*UITests*"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.runformcoachai.uitests
        INFOPLIST_FILE: RunFormCoachAI/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        TEST_TARGET_NAME: RunFormCoachAI
    dependencies:
      - target: RunFormCoachAI
    scheme:
      testTargets:
        - RunFormCoachAIUITests
      gatherCoverageData: true

schemes:
  RunFormCoachAI:
    build:
      targets:
        RunFormCoachAI: all
        RunFormCoachAITests: [test]
        RunFormCoachAIUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - RunFormCoachAITests
        - RunFormCoachAIUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
