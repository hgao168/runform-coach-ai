# SwiftLint configuration for RunFormCoachAI
# Run with: swiftlint lint --config .swiftlint.yml

# ——— Included/Excluded ———
included:
  - RunFormCoachAI

excluded:
  - RunFormCoachAI/Assets.xcassets
  - RunFormCoachAI/*.generated.swift

# ——— Rule Toggles ———
disabled_rules:
  - trailing_whitespace
  - todo
  - nesting

opt_in_rules:
  - empty_count
  - empty_string
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_object_literal
  - explicit_init
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - implicit_return
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - unused_import
  - unused_declaration
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# ——— Rule Tuning ———
line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true

file_length:
  warning: 500
  error: 800

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 60
  error: 120

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60
  excluded:
    - ID
    - DB

identifier_name:
  min_length: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - z
    - dx
    - dy
    - dz
    - to
    - on
    - at
    - up

cyclomatic_complexity:
  warning: 12
  error: 18

large_tuple:
  warning: 3
  error: 4

# ——— Custom Rules ———
custom_rules:
  no_direct_print:
    name: "No Direct Print"
    regex: '(?<!// )\bprint\('
    message: "Use os_log or a dedicated logger instead of print()."
    severity: warning

  no_fatal_error:
    name: "No Fatal Error"
    regex: '\bfatalError\('
    message: "Avoid fatalError() in production code. Use assertionFailure() in debug or proper error handling."
    severity: warning

  no_force_try:
    name: "No Force Try"
    regex: '\btry!\b'
    message: "Avoid force try. Use do/catch with proper error handling."
    severity: error
