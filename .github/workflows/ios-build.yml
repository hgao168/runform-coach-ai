name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project RunFormCoachAI.xcodeproj \
            -scheme RunFormCoachAI \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Find .app bundle
        run: |
          find DerivedData -name "*.app" -not -path "*/PackageFrameworks/*" | head -5

      - name: Zip .app for Appetize
        run: |
          APP_PATH=$(find DerivedData -name "RunFormCoachAI.app" -not -path "*/PackageFrameworks/*" | head -1)
          zip -r RunFormCoachAI-simulator.zip "$APP_PATH"

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunFormCoachAI-simulator
          path: RunFormCoachAI-simulator.zip
          retention-days: 7
