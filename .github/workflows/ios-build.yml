name: iOS Build & Archive

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build & Export iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select latest Xcode version
        run: |
          echo "Available Xcode installations:"
          ls /Applications/ | grep -i xcode || true
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting: $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      # ── Code Signing Setup ──────────────────────────────────────────────────

      - name: Create temporary keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          # Add to the search list so Xcode can find it
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Import distribution certificate
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/distribution.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "${{ secrets.IOS_CERTIFICATE_P12 }}" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" \
            "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "${{ secrets.IOS_PROVISION_PROFILE }}" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(security cms -D -i "$PP_PATH" | \
            python3 -c "import plistlib, sys; pl = plistlib.loads(sys.stdin.buffer.read()); print(pl['UUID'])")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "Installed provisioning profile UUID: $PROFILE_UUID"

      # ── Generate & Archive ──────────────────────────────────────────────────

      - name: Generate placeholder app icon
        run: |
          python3 - <<'PYEOF'
          import struct, zlib
          def png_bytes(w, h, r=0, g=122, b=255):
              raw = bytearray()
              for _ in range(h):
                  raw.append(0)
                  for _ in range(w):
                      raw.extend([r, g, b])
              def chunk(t, d):
                  crc = zlib.crc32(t + d) & 0xffffffff
                  return struct.pack('>I', len(d)) + t + d + struct.pack('>I', crc)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              return (b'\x89PNG\r\n\x1a\n' +
                      chunk(b'IHDR', ihdr) +
                      chunk(b'IDAT', zlib.compress(bytes(raw))) +
                      chunk(b'IEND', b''))
          with open('ios/RunFormCoachAI/Assets.xcassets/AppIcon.appiconset/AppIcon.png', 'wb') as f:
              f.write(png_bytes(1024, 1024))
          print('Generated AppIcon.png')
          PYEOF

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive app
        run: |
          xcodebuild archive \
            -project RunFormCoachAI.xcodeproj \
            -scheme RunFormCoachAI \
            -archivePath "$RUNNER_TEMP/RunFormCoachAI.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=39CYNW3CYT \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="RunFormCoachAI-Prod"

      # ── Export IPA ──────────────────────────────────────────────────────────

      - name: Create ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>39CYNW3CYT</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.movex.runformcoachai</key>
              <string>RunFormCoachAI-Prod</string>
            </dict>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/RunFormCoachAI.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunFormCoachAI-ipa
          path: ${{ runner.temp }}/export/RunFormCoachAI.ipa
          retention-days: 30

      # ── TestFlight Upload ────────────────────────────────────────────────────

      - name: Upload to TestFlight
        run: |
          # altool requires the .p8 to be in ~/.appstoreconnect/private_keys/
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/RunFormCoachAI.ipa" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            --verbose

          rm -f ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      # ── Cleanup ─────────────────────────────────────────────────────────────

      - name: Clean up keychain and provisioning profile
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision || true
