name: iOS Test Suite (XCTest)

on:
  pull_request:
    paths:
      - 'ios/**'
      - 'project.yml'
      - '.github/workflows/ios-test.yml'
  push:
    branches: [master, staging]
    paths:
      - 'ios/**'
      - 'project.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run XCTest
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting: $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --config ios/.swiftlint.yml --strict
        continue-on-error: true

      - name: List available simulators (debug)
        run: xcrun simctl list devices available | head -20

      - name: Pre-boot simulator
        id: simulator
        run: |
          DEST="iPhone 16"
          # Use simctl JSON to reliably extract UDID (sed regex is brittle on macOS)
          UDID=$(xcrun simctl list devices available -j | python3 -c 'import json,sys; devs=[d for rt,ds in json.load(sys.stdin)["devices"].items() if "iOS" in rt for d in ds if d["name"]=="'"$DEST"'"]; print(devs[0]["udid"] if devs else "")' 2>/dev/null)
          if [ -n "$UDID" ]; then
            echo "simulator_udid=$UDID" >> "$GITHUB_OUTPUT"
            echo "Booting simulator: $UDID"
            xcrun simctl boot "$UDID" || true
          else
            echo "simulator_udid=" >> "$GITHUB_OUTPUT"
            echo "⚠️  Simulator '$DEST' not found, will let xcodebuild create it"
          fi

      - name: Run XCTest
        run: |
          SIM_DEST="platform=iOS Simulator,name=iPhone 16"
          if [ -n "${{ steps.simulator.outputs.simulator_udid }}" ]; then
            SIM_DEST="platform=iOS Simulator,id=${{ steps.simulator.outputs.simulator_udid }}"
            echo "Using simulator UDID: ${{ steps.simulator.outputs.simulator_udid }}"
          fi
          xcodebuild test \
            -project RunFormCoachAI.xcodeproj \
            -scheme RunFormCoachAI \
            -destination "$SIM_DEST" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcode_test.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-xctest-logs
          path: xcode_test.log
          retention-days: 7

      - name: Check test result
        if: always()
        run: |
          if grep -q '\*\* TEST SUCCEEDED \*\*' xcode_test.log; then
            echo "✅ All tests passed"
          else
            echo "❌ Tests failed — check logs above"
            exit 1
          fi
