name: iOS Staging → TestFlight (Manual)

# Manual dispatch only — run this when you want to push a staging build to TestFlight.
# Always checks out the 'staging' branch, builds DEBUG config → staging backend URL.
on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: 'Upload IPA to TestFlight after build'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Upload Staging IPA to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Patch display name for staging
        run: |
          path=project.yml
          [ -f "$path" ] || path=ios/project.yml
          perl -0pi -e 's/(^\s*CFBundleDisplayName:\s*).*$/$1RunForm (Staging)/m' "$path"
          grep -q '^\s*CFBundleDisplayName: RunForm (Staging)$' "$path"
          echo "Patched $path: CFBundleDisplayName = RunForm (Staging)"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select latest Xcode version
        run: |
          echo "Available Xcode installations:"
          ls /Applications/ | grep -i xcode || true
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting: $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      # ── Code Signing Setup ──────────────────────────────────────────────────

      - name: Create temporary keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Import distribution certificate
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/distribution.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "${{ secrets.IOS_CERTIFICATE_P12 }}" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" \
            "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "${{ secrets.IOS_PROVISION_PROFILE }}" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(security cms -D -i "$PP_PATH" | \
            python3 -c "import plistlib, sys; pl = plistlib.loads(sys.stdin.buffer.read()); print(pl['UUID'])")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "Installed provisioning profile UUID: $PROFILE_UUID"

      # ── Generate & Archive (DEBUG = staging backend) ────────────────────────

      - name: Generate Xcode project
        run: |
          SPEC=project.yml
          [ -f "$SPEC" ] || SPEC=ios/project.yml
          xcodegen generate --spec "$SPEC"

      - name: Archive app (Debug configuration → staging backend)
        run: |
          xcodebuild archive \
            -project RunFormCoachAI.xcodeproj \
            -scheme RunFormCoachAI \
            -configuration Debug \
            -archivePath "$RUNNER_TEMP/RunFormCoachAI-Staging.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=39CYNW3CYT \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="RunFormCoachAI-Prod" \
            BACKEND_BASE_URL="https://runform-coach-ai-staging.up.railway.app" \
            CURRENT_PROJECT_VERSION="2.${{ github.run_number }}" \
            MARKETING_VERSION="1.2"
          # Note: BACKEND_BASE_URL is now explicitly overridden to staging URL.

      # ── Export IPA ──────────────────────────────────────────────────────────

      - name: Create ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>39CYNW3CYT</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.movex.runformcoachai</key>
              <string>RunFormCoachAI-Prod</string>
            </dict>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/RunFormCoachAI-Staging.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" | head -1)
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          echo "Exported IPA: $IPA_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunFormCoachAI-Staging-ipa
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 14

      # ── TestFlight Upload ────────────────────────────────────────────────────

      - name: Upload to TestFlight
        if: ${{ github.event.inputs.upload_to_testflight == 'true' }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            --verbose

          rm -f ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      # ── Cleanup ─────────────────────────────────────────────────────────────

      - name: Clean up keychain and provisioning profile
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision || true
