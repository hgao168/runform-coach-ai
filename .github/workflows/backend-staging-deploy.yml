name: Backend Staging → Railway (Manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend to Railway Staging
    runs-on: ubuntu-latest

    steps:
      - name: Install Railway CLI
        run: curl -fsSL https://railway.com/install.sh | sh

      - name: Redeploy staging service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link \
            --project c9c80ae8-2103-4969-9420-fac60b0c38dd \
            --environment staging \
            --service d2bdff7b-1da5-4144-838b-681527e8ee8d
          railway redeploy --yes
