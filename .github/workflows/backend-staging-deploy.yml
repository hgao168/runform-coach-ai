name: Backend Staging → Railway (Manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend to Railway Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and deploy via Railway CLI
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          bash <(curl -fsSL cli.new)
          ~/.railway/bin/railway up \
            --service d2bdff7b-1da5-4144-838b-681527e8ee8d \
            --environment ac84ae0a-1117-46da-a004-acdd44027184 \
            --detach
