# RunForm iOS — SwiftLint 配置
# 应用于 ios/RunFormCoachAI/ 下所有 .swift 文件

disabled_rules:
  - trailing_whitespace          # Xcode 自动处理
  - line_length                  # IDE 自行提示即可
  - file_length                  # 部分 View 文件较长是合理的
  - type_body_length
  - function_body_length
  - cyclomatic_complexity
  - nesting

opt_in_rules:
  - empty_count
  - empty_string
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - fatal_error_message
  - first_where
  - implicit_return
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - unused_import
  - yoda_condition

excluded:
  - ios/RunFormCoachAI/Generated/
  - ios/Pods/
  - .build/

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - vm
    - db
    - x
    - y
    - z
    - en
    - zh
    - nl

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60

trailing_comma:
  mandatory_comma: true

reporter: "xcode"
